version: "3.8"

services:
  openhands:
    image: ${OPENHANDS_IMAGE:-docker.openhands.dev/openhands/openhands:latest}
    container_name: openhands-app
    restart: unless-stopped
    ports:
      - "${OPENHANDS_PORT:-3000}:3000"
      - "${OPENHANDS_VSCODE_PORT:-41234}:41234"
    environment:
      AGENT_SERVER_IMAGE_REPOSITORY: ${AGENT_SERVER_IMAGE_REPOSITORY:-ghcr.io/openhands/agent-server}
      AGENT_SERVER_IMAGE_TAG: ${AGENT_SERVER_IMAGE_TAG:-1.12.0-python}
      SANDBOX_VSCODE_PORT: ${OPENHANDS_VSCODE_PORT:-41234}
      LOG_ALL_EVENTS: ${LOG_ALL_EVENTS:-true}
      OPENAI_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4.6}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.openhands:/.openhands
    extra_hosts:
      - host.docker.internal:host-gateway

  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: vllm-openai
    restart: unless-stopped
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    ipc: host
    runtime: nvidia
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3-0.6B}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
