# VXSTATION nginx configuration — reverse proxy for room frontend + API backend.
# Cloudflare tunnel → :7800 → nginx → Next.js (:3000) + Fastify (:7900)

upstream vxstation_web {
    server 127.0.0.1:3000;
    keepalive 8;
}

upstream vxstation_api {
    server 127.0.0.1:7900;
    keepalive 8;
}

server {
    listen 127.0.0.1:7800;
    server_name _;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # API routes → Fastify backend
    location /api/ {
        proxy_pass http://vxstation_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Build metadata → Fastify backend
    location = /build {
        proxy_pass http://vxstation_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check → Fastify backend
    location = /health {
        proxy_pass http://vxstation_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket → Fastify backend
    location /ws {
        proxy_pass http://vxstation_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://vxstation_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://vxstation_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Logging
    access_log /opt/vxstation/shared/logs/nginx-access.log;
    error_log /opt/vxstation/shared/logs/nginx-error.log;
}
